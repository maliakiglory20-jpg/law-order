# Render Blueprint — deploys the NestJS backend + a managed Postgres.
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file, provisions the database and web service, and wires the env vars.
#
# The backend image runs `prisma migrate deploy` on boot, so the schema is
# created automatically. To load the 35 litigation types + 175 cases, run the
# seed once from your machine against the database's EXTERNAL connection string
# (see README/notes):
#   cd backend && DATABASE_URL="<external-connection-string>" npm run prisma:seed
#
# The frontend's AI features require ANTHROPIC_API_KEY — set it in the Render
# dashboard (it is intentionally not stored in the repo).

databases:
  - name: litigation-db
    databaseName: litigation_platform
    user: postgres
    plan: free

services:
  - type: web
    name: litigation-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /api/docs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: litigation-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://law-order-pied.vercel.app
      - key: CORS_ORIGINS
        value: https://law-order-pied.vercel.app
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: UPLOAD_DIR
        value: ./uploads
      # Optional — enables Claude-powered features. Set in the Render dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
